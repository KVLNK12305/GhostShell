# Project Ghost Configuration
# Silent Cyber Operations Agent

agent:
  name: "ghost-agent"
  stealth_level: "maximum"
  autonomous: true
  scan_interval: 5
  self_destruct_on_detect: true

perception:
  monitors:
    network: true
    system: true
    auth: true
    filesystem: true
  scan_interval: 5
  anomaly_threshold: 0.7
  max_history: 10000

actions:
  auto_neutralize: true
  probe_depth: "aggressive"
  counter_strategy: "adaptive"
  deception_enabled: true

stealth:
  hide_process: true
  hide_memory: true
  obfuscate_traffic: true
  clean_logs: true
  self_destruct_on_detect: true
  encryption_level: "military"

reporting:
  method: "covert"
  encryption: "AES-256-GCM"
  destination: "https://intel.ghost.local/report"
  frequency: 60
  compression: true

security:
  encryption_key_rotation: 3600
  max_failures: 5
  integrity_check: true

features:
  ai_enabled: false
  team_sync: false
  forensics: true
  deception: true
